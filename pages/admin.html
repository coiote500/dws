<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b16" />
    <title>DWX DEV - Admin</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="/" class="logo" aria-label="DWX DEV">
          <img src="../assets/images/logo.svg" alt="DWX DEV" />
        </a>
        <ul>
          <li><a href="/">Início</a></li>
          <li><a href="/#projects">Projetos</a></li>
          <li><a href="/#about">Sobre</a></li>
          <li><a href="/#contact">Contato</a></li>
        </ul>
      </nav>
    </header>

    <main class="admin">
      <section class="admin-panel">
        <h1>Admin</h1>
        <div class="admin-grid">
          <div class="admin-card">
            <h2>Mensagens recebidas</h2>
            <button id="refreshMessages" class="project-btn secondary">
              Atualizar
            </button>
            <button id="clearMessages" class="project-btn secondary">
              Limpar
            </button>
            <div id="messages" class="admin-list"></div>
          </div>
          <div class="admin-card">
            <h2>Editar projetos</h2>
            <div id="projects" class="admin-list"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 DWX DEV. Todos os direitos reservados.</p>
      <p>Contato: Daniel Azevedo • (91) 98112-1705</p>
    </footer>

    <script>
      const PASSWORD = "admin123"; // Senha simples para acesso

      if (!sessionStorage.getItem("adminAuth")) {
        const input = prompt("Digite a senha de admin:");
        if (input !== PASSWORD) {
          alert("Acesso negado.");
          window.location.href = "/";
        } else {
          sessionStorage.setItem("adminAuth", "true");
        }
      }

      async function fetchJson(path, options) {
        const res = await fetch(path, options);
        return res.json();
      }

      function formatMessage(raw) {
        const [date, name, email, message] = raw.split(" | ");
        return {
          date,
          name,
          email,
          message,
        };
      }

      async function loadMessages() {
        const container = document.getElementById("messages");
        container.innerHTML = "<p>Carregando...</p>";
        const data = await fetchJson("/api/contacts");
        if (!data.success) {
          container.innerHTML = `<p>Erro: ${data.error}</p>`;
          return;
        }
        if (!data.messages.length) {
          container.innerHTML = "<p>Nenhuma mensagem recebida ainda.</p>";
          return;
        }
        container.innerHTML = "";
        data.messages.forEach((raw) => {
          const msg = formatMessage(raw);
          const card = document.createElement("div");
          card.className = "admin-row";
          card.innerHTML = `
            <div>
              <strong>${msg.name}</strong> (${msg.email})
              <div class="muted">${msg.date}</div>
            </div>
            <div>${msg.message}</div>
          `;
          container.appendChild(card);
        });
      }

      async function loadProjects() {
        const container = document.getElementById("projects");
        container.innerHTML = "<p>Carregando...</p>";
        const projects = await fetchJson("/api/projects");
        container.innerHTML = "";
        projects.forEach((project) => {
          const card = document.createElement("div");
          card.className = "admin-row";

          card.innerHTML = `
            <div class="admin-row-title">
              <strong>${project.title}</strong>
              <span class="muted">${project.slug}</span>
            </div>
            <textarea data-slug="${project.slug}" rows="4">${project.description}</textarea>
            <button data-slug="${project.slug}" class="project-btn secondary">Salvar</button>
          `;

          const button = card.querySelector("button");
          button.addEventListener("click", async () => {
            const textarea = card.querySelector("textarea");
            await fetchJson(`/api/projects/${project.slug}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ description: textarea.value }),
            });
            button.textContent = "Salvo";
            setTimeout(() => (button.textContent = "Salvar"), 1200);
          });

          container.appendChild(card);
        });
      }

      document
        .getElementById("refreshMessages")
        .addEventListener("click", loadMessages);
      document
        .getElementById("clearMessages")
        .addEventListener("click", async () => {
          await fetchJson("/api/contacts", { method: "DELETE" });
          loadMessages();
        });

      loadMessages();
      loadProjects();
    </script>
  </body>
</html>
