<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b16" />
    <title>DWX DEV - Projeto</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="/" class="logo" aria-label="DWX DEV">
          <img src="../assets/images/logo.svg" alt="DWX DEV" />
        </a>
        <ul>
          <li><a href="/">Início</a></li>
          <li><a href="/#projects">Projetos</a></li>
          <li><a href="/#about">Sobre</a></li>
          <li><a href="/#contact">Contato</a></li>
        </ul>
      </nav>
    </header>

    <main class="project-page">
      <section class="project-hero" id="projectHero">
        <div class="project-hero-content">
          <h1 id="projectTitle">Carregando...</h1>
          <p id="projectSubtitle"></p>
          <div id="projectTags" class="project-tags"></div>
        </div>
        <div class="project-hero-image">
          <img id="projectImage" alt="Projeto" />
        </div>
      </section>

      <section class="project-detail" id="projectDetail">
        <h2>O que inclui</h2>
        <p id="projectDescription"></p>
        <ul id="projectFeatures" class="project-features"></ul>
      </section>

      <section class="project-links">
        <a href="/" class="cta-btn">Voltar ao início</a>
        <a id="projectNext" class="cta-btn secondary" href="/"
          >Ver outro projeto</a
        >
      </section>
    </main>

    <footer>
      <p>&copy; 2026 DWX DEV. Todos os direitos reservados.</p>
      <p>Contato: Daniel Azevedo • (91) 98112-1705</p>
    </footer>

    <script>
      async function fetchProject(slug) {
        const res = await fetch(`/api/projects/${slug}`);
        if (!res.ok) throw new Error("Projeto não encontrado");
        return res.json();
      }

      function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
      }

      function renderProject(project) {
        document.title = `DWX DEV - ${project.title}`;
        setText("projectTitle", project.title);
        setText("projectSubtitle", project.subtitle);
        setText("projectDescription", project.description);

        const tags = document.getElementById("projectTags");
        tags.innerHTML = "";
        project.tech.forEach((tech) => {
          const chip = document.createElement("span");
          chip.className = "tag";
          chip.textContent = tech;
          tags.appendChild(chip);
        });

        const features = document.getElementById("projectFeatures");
        features.innerHTML = "";
        project.features.forEach((feature) => {
          const li = document.createElement("li");
          li.textContent = feature;
          features.appendChild(li);
        });

        const img = document.getElementById("projectImage");
        img.src = project.img;
        img.alt = project.title;

        const nextLink = document.getElementById("projectNext");
        nextLink.href = `/project/${project.next || project.slug}`;
      }

      function getSlug() {
        const parts = window.location.pathname.split("/").filter(Boolean);
        return parts.length ? parts[parts.length - 1] : "";
      }

      (async () => {
        try {
          const slug = getSlug();
          if (!slug) throw new Error("Slug inválido");
          const project = await fetchProject(slug);
          renderProject(project);
        } catch (err) {
          setText("projectTitle", "Projeto não encontrado");
          setText(
            "projectSubtitle",
            "Verifique se o link está correto e tente novamente.",
          );
          document.getElementById("projectDetail").style.display = "none";
        }
      })();
    </script>
  </body>
</html>
